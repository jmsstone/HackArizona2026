services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"  # Host 5001 -> Container 5001
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "5002:80"  # Frontend remains on 5002 for your browser
    depends_on:
      - backend